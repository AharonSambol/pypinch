name: test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_call:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: pip install -r requirements.dev.txt

    - name: Build and install Rust extension
      run: |
        maturin build --out dist
        pip install --no-index --find-links=dist pypinch

    - name: Run Tests (Rust Backend)
      run: |
        pytest -c ./tests/pytest-ci.ini --rootdir ./tests/

    - name: Run Tests (Python Fallback)
      run: |
        export PYPINCH_FORCE_PYTHON=1
        pytest -c ./tests/pytest-ci.ini --rootdir ./tests/
